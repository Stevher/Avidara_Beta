name: Auto-generate blog article

on:
  # Runs on the 1st and 15th of every month at 08:00 UTC
  schedule:
    - cron: "0 8 1,15 * *"
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      topic_override:
        description: "Optional custom topic (leave blank to use next queued topic)"
        required: false
        default: ""

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOPIC_OVERRIDE: ${{ github.event.inputs.topic_override }}
        run: node .github/scripts/generate-post.mjs

      - name: Create branch and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTICLE_TITLE=$(cat /tmp/article-title.txt)
          BRANCH="blog/auto-$(date +%Y%m%d-%H%M)"

          git config user.name "Avidara Blog Bot"
          git config user.email "hello@avidara.co.za"
          git checkout -b "$BRANCH"
          git add apps/frontend/src/content/blog/posts/ apps/frontend/src/content/blog/topics.json
          git commit -m "blog: draft — $ARTICLE_TITLE"
          git push origin "$BRANCH"

          cat > /tmp/pr-body.md << 'PREOF'
          ## Auto-generated blog article

          **Please review for factual accuracy before merging.** Regulatory content should be verified by a subject matter expert.

          ### To publish
          1. Read the article in the **Files changed** tab
          2. Edit any inaccuracies directly in the PR if needed
          3. Click **Merge pull request** — Vercel will deploy automatically

          ### To discard
          Close this PR without merging.

          ---
          *Generated by the Avidara auto-blog workflow. Topic source: `apps/frontend/src/content/blog/topics.json`*
          PREOF

          PR_URL=$(gh pr create \
            --title "Blog draft: $ARTICLE_TITLE" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "$BRANCH" \
            --reviewer Stevher \
            --assignee Stevher)

          echo "$PR_URL" > /tmp/pr-url.txt

      - name: Send review email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          ARTICLE_TITLE=$(cat /tmp/article-title.txt)
          PR_URL=$(cat /tmp/pr-url.txt)

          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"Avidara Blog Bot <hello@avidara.co.za>\",
              \"to\": [\"hello@avidara.co.za\"],
              \"subject\": \"Blog draft ready for review: $ARTICLE_TITLE\",
              \"html\": \"<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'></head><body style='margin:0;padding:0;background:#0f172a;font-family:Helvetica Neue,Arial,sans-serif;'><table width='100%' cellpadding='0' cellspacing='0' style='background:#0f172a;padding:40px 24px;'><tr><td align='center'><table width='100%' cellpadding='0' cellspacing='0' style='max-width:600px;width:100%;'><tr><td style='padding-bottom:32px;text-align:center;'><img src='https://avidara.co.za/logo-full-dark-strap.svg' alt='Avidara' width='200' height='60' style='display:inline-block;' /></td></tr><tr><td style='padding-bottom:32px;'><div style='height:1px;background:linear-gradient(90deg,transparent,#4f46e5 30%,#10b981 70%,transparent);opacity:0.4;'></div></td></tr><tr><td style='background:#1e293b;border-radius:16px;padding:40px;border:1px solid rgba(255,255,255,0.07);'><p style='margin:0 0 8px;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#10b981;'>Regulatory Insights</p><h1 style='margin:0 0 8px;font-size:24px;font-weight:700;color:#f1f5f9;line-height:1.3;'>New Blog Draft Ready</h1><p style='margin:0 0 32px;font-size:15px;color:#94a3b8;'>A new article has been generated and is waiting for your review before publishing.</p><table width='100%' cellpadding='0' cellspacing='0' style='background:#0f172a;border-radius:12px;border:1px solid rgba(255,255,255,0.07);margin-bottom:24px;'><tr><td style='padding:24px;'><p style='margin:0 0 4px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#64748b;'>Article Title</p><p style='margin:0 0 16px;font-size:16px;color:#f1f5f9;font-weight:600;border-bottom:1px solid rgba(255,255,255,0.07);padding-bottom:16px;'>$ARTICLE_TITLE</p><p style='margin:0 0 4px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#64748b;'>How to publish</p><p style='margin:0;font-size:14px;color:#94a3b8;line-height:1.6;'>1. Click the button below to open the PR<br>2. Click <strong style='color:#f1f5f9;'>View Deployment</strong> in the PR to preview the live article<br>3. Review for accuracy — edit directly in the PR if needed<br>4. Click <strong style='color:#f1f5f9;'>Merge pull request</strong> to publish · Vercel deploys automatically</p></td></tr></table><table cellpadding='0' cellspacing='0' style='margin-bottom:16px;'><tr><td style='border-radius:10px;background:linear-gradient(135deg,#4f46e5,#3730a3);'><a href='$PR_URL' style='display:inline-block;padding:14px 28px;font-size:14px;font-weight:600;color:#ffffff;text-decoration:none;border-radius:10px;'>Review &amp; Approve Article →</a></td></tr></table><p style='margin:0;font-size:13px;color:#475569;'>To discard — close the PR without merging.</p></td></tr><tr><td style='padding-top:32px;text-align:center;'><p style='margin:0;font-size:12px;color:#334155;'>Sent from <a href='https://avidara.co.za' style='color:#4f46e5;text-decoration:none;'>avidara.co.za</a> · Auto-generated by Avidara Blog Bot</p></td></tr></table></td></tr></table></body></html>\"
            }"
