version: 1
applications:
  - appRoot: apps/frontend
    frontend:
      phases:
        preBuild:
          commands:
            - nvm use 20
            - corepack enable
            - yarn install --immutable
        build:
          commands:
            - yarn build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
    env:
      variables:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
